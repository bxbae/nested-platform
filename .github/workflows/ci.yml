# 배치 위치: .github/workflows/ci.yml
#
# PR 검증 — master 로 들어가기 전에 타입체크 · 테스트 · 빌드를 돌린다.
#
# 이 파일이 생긴 이유: 한 PR 이 머지되면서 다른 기능의 타입을 깨뜨리고
# (ReservationWithRoom 에 payment 필드 추가), 또 다른 PR 이 이미 머지된
# 파일을 예전 버전으로 덮어써서 (쿠폰 API) master 가 두 번 깨졌다.
# 사람이 매번 확인하는 대신 CI 가 잡는다.
#
# 백엔드와 프론트를 별도 job 으로 돌려 병렬 실행하고, 어느 쪽이 깨졌는지
# 한눈에 보이게 한다. DB 는 띄우지 않는다 — 테스트는 전부 mock 기반이라
# 실제 연결이 필요 없고, prisma generate 는 스키마만 읽으면 되기 때문이다.

name: CI

on:
  pull_request:
    branches: [master]
  # master 직접 푸시(관리자 우회 머지 포함)도 검증해 두면
  # 깨진 상태가 오래 남지 않는다.
  push:
    branches: [master]

# 같은 PR 에 연속으로 푸시하면 이전 실행은 취소한다 — 무료 러너 시간 절약.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: 백엔드 (타입체크 · 테스트)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nested-mono/apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nested-mono/apps/api/package-lock.json

      - name: 의존성 설치
        run: npm ci

      # Prisma Client 를 만들어야 tsc 가 모델 타입을 안다. 실제 DB 에 붙지는
      # 않지만 schema.prisma 가 env("DATABASE_URL") 를 참조하므로 형식만 맞는
      # 더미 값을 넣어 준다.
      - name: Prisma Client 생성
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public

      - name: 타입체크
        run: npx tsc --noEmit

      - name: 테스트
        run: npm test

  web:
    name: 프론트 (타입체크 · 빌드)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coliving
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: coliving/package-lock.json

      - name: 의존성 설치
        run: npm ci

      - name: 타입체크
        run: npx tsc --noEmit

      # 빌드는 config.ts 의 기본값으로 돌아간다 (NEXT_PUBLIC_* 없이도 통과).
      # 실제 API 주소는 Vercel 환경변수에서 주입된다.
      - name: 빌드
        run: npx next build
